<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Meu Contador Interativo</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="counter-container">
        <h1>Contador</h1>
        <div id="value">0</div>
        <div class="button-group">
            <button id="btn-decrease" class="btn">Diminuir</button>
            <button id="btn-reset" class="btn">Resetar</button>
            <button id="btn-increase" class="btn">Aumentar</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
